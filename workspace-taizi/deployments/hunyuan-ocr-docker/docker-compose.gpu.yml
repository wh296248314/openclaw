# ============================================================
# docker-compose.gpu.yml - HunyuanOCR GPU版本 (NVIDIA GPU)
# ============================================================
# 前置条件:
#   1. 安装 NVIDIA Container Toolkit: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
#   2. 配置 Docker runtime: nvidia-container-toolkit
#   3. 验证: docker run --gpus all nvidia/cuda:12.1.0-base-ubuntu22.04 nvidia-smi
#
# 用法:
#   docker-compose -f docker-compose.gpu.yml up -d
# ============================================================

version: "3.8"

services:
  hunyuan-ocr-gpu:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime-gpu
      args:
        CUDA_VERSION: "12.1"
    container_name: hunyuan-ocr-gpu
    image: hunyuan-ocr:latest-gpu
    restart: unless-stopped
    ports:
      - "${OCR_PORT:-8000}:8000"
    environment:
      - MODEL_NAME=${MODEL_NAME:-Tencent/HunyuanOCR}
      - MODEL_CACHE_DIR=/models
      - DEVICE=cuda
      - PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - HF_ENDPOINT=https://hf-mirror.com
      - HF_HOME=/models
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      # 模型缓存持久化
      - hunyuan-ocr-models-gpu:/models
      # 可选：挂载图片目录
      - ${IMAGE_DIR:-./images}:/data/images:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - hunyuan-ocr-gpu-net

volumes:
  hunyuan-ocr-models-gpu:
    driver: local

networks:
  hunyuan-ocr-gpu-net:
    driver: bridge
